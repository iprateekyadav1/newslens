services:
  - type: web
    name: newslens
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./newslens.db
      - key: ROBERTA_BASE
        value: roberta-base
      - key: MAX_TEXT_LENGTH
        value: "10000"
      - key: MAX_BATCH_SIZE
        value: "10"
      - key: RATE_ANALYZE
        value: "30/minute"
      - key: RATE_BATCH
        value: "5/minute"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: SCRAPER_TIMEOUT
        value: "15"
      - key: LOG_LEVEL
        value: "INFO"
    healthCheckPath: /api/health
